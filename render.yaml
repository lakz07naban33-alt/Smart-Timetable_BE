services:
  - type: web
    name: smart-timetable-backend
    env: java
    buildCommand: "mvn clean package -DskipTests"
    startCommand: "java -jar target/smart-timetable-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
